<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Your Store</title>
    <link rel="stylesheet" href="{% static 'css/checkout.css' %}">
</head>
<body>
     
    <div class="container">
        
    <div class="back">
<a  href="{% url 'home' %}" class="back-btn">←Go Back</a>
    </div>

            <div class="checkout-form">
                <h2 class="section-title">Checkout Details</h2>
                
                <form method="POST" class="form-container">
                    {% csrf_token %}
                    
                    <div class="form-group">
                        <label for="fullname">Full Name *</label>
                        <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Delivery Address *</label>
                        <textarea id="address" name="address" placeholder="Street, City, State, ZIP Code" rows="3" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Payment Method *</label>
                        <div class="payment-options">
                            <label class="payment-option">
                                <input type="radio" name="payment" value="upi" required>
                                <span class="payment-label">
                                    <span class="payment-icon">📱</span>
                                   Upi Payment
                                </span>
                            </label>
                            <label class="payment-option">
                                <input type="radio" name="payment" value="cod">
                                <span class="payment-label">
                                    <span class="payment-icon">💵</span>
                                    Cash on Delivery
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">Order Notes (Optional)</label>
                        <textarea id="notes" name="notes" placeholder="Any special instructions..." rows="2"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                    <button type="submit" class="place-order-btn">
                        <span>Place Order</span>
                        <span class="btn-amount"> ₹{{ total_price }}</span>
                    </button>

                    <div class="secure-checkout">
                        <span>🔒</span>
                        <span>Secure Checkout - SSL Encrypted</span>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

{% if show_razorpay %}
<script>
var options = {
    "key": "{{ razorpay_key }}",
    "amount": "{{ payment.amount }}",
    "currency": "INR",
    "name": "JerseyHub",
    "description": "Order Payment",
    "order_id": "{{ payment.id }}",

    "handler": function (response){

        fetch("/payment-success/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": "{{ csrf_token }}"
            },
            body: JSON.stringify({
                razorpay_payment_id: response.razorpay_payment_id,
                address: "{{ address }}",
                phone: "{{ phone }}"
            })
        });

        window.location.replace("/order-success/");
    }
};

var rzp = new Razorpay(options);
rzp.open();  // 🔥 AUTO OPEN
</script>
{% endif %}
</html>
