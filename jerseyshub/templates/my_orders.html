<!DOCTYPE html>
<html lang="en">
<head>
    {% load static  %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <link rel="stylesheet" href="{% static 'css/my_orders.css'%}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>My Orders</h2>
        
        <div class="orders-wrapper">
            {% for order in orders %}
                <div class="order-card">
                    <div class="order-image">
                        <img src="{{ order.jersey.image.url }}" width="120" alt="{{ order.jersey.team }}">
                    </div>
                    
                    <div class="order-content">
                        <h3>{{ order.jersey.team }}</h3>
                        
                        <div class="order-details">
                            <p><span class="label">Quantity:</span> <span class="value">{{ order.quantity }}</span></p>
                            <p><span class="label">Total:</span> <span class="value price">₹ {{ order.total_price }}</span></p>
                            <p><span class="label">Status:</span> <span class="status-badge status-{{ order.status|lower }}">{{ order.status }}</span></p>
                            <p><span class="label">Ordered on:</span> <span class="value">{{ order.created_at }}</span></p>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
