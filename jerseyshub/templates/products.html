<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>
    <link rel="stylesheet" href="{%  static  'css/Products.css' %}">
</head>
<body>
    <h2>Products</h2>
    <div class="jerseys">
        {% for jersey in jersey %}
        <div class="jerseys-card">
            <a href="{% url 'jersey_detail' jersey.id %}">
        <img src="{{ jersey.image.url }}" class="jersey-img">
    </a>

    <div class="jersey-info">
        <h3>{{ jersey.name }}</h3>
        <p class="price">₹ {{ jersey.price }}</p>

        <button class="cart-btn">Add to Cart</button>
    </div>

</div>
{% endfor %}
        </div>
    </div>
</body>
</html>
