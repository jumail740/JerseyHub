<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 380px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 5px;
        }

        .qr img {
            width: 180px;
            margin: 15px 0;
        }

        .upi {
            background: #eee;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
        }

        .details {
            text-align: left;
            margin-top: 15px;
        }

        .details p {
            margin: 6px 0;
            font-size: 14px;
        }

        .amount {
            font-size: 18px;
            font-weight: bold;
            color: #27ae60;
            margin: 10px 0;
        }

        .btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background: #219150;
        }

        .note {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>UPI Payment</h2>
    <p>Scan & Pay</p>

    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=yourname@upi&pn=JerseyShop&am={{ total_price }}" alt="QR">
    </div>

    <div class="upi">
        UPI ID: yourname@upi
    </div>

    <div class="amount">
        ₹{{ total_price }}
    </div>

    <div class="details">
        <p><b>Name:</b> {{ fullname }}</p>
        <p><b>Email:</b> {{ email }}</p>
        <p><b>Phone:</b> {{ phone }}</p>
        <p><b>Address:</b> {{ address }}</p>
    </div>

    <form method="POST" action="{% url 'confirm_upi' %}">
        {% csrf_token %}
        <input type="hidden" name="address" value="{{ address }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <button class="btn">I Have Paid</button>
    </form>

    <div class="note">
        After payment, click the button to confirm your order
    </div>
</div>

</body>
</html>
