<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{%  static   'css/wishlist.css'  %}">
</head>

<body>
    <h2>My Wishlist</h2>
    

        <div class="jersey-container">

{% for item in wishlist_items %}

<div class="jersey-card">
<img src="{{ item.jersey.image.url }}" alt="" ><a href="{% url 'remove_wishlist' item.jersey.id %}" class="remove-btn">
❌ 
</a>
<h3>{{ item.jersey.team }}</h3>
<p>₹ {{ item.jersey.price }}</p>

{% if item.jersey.stock == 0 %}
<span class="soldout">Sold Out</span>

{% elif item.jersey.stock <= 5 %}
<span class="lowstock">Only {{ item.jersey.stock }} left</span>
{% endif %}

 <a href="{% url 'add_to_cart' jersey.id %}">
<button class="cart-btn">Add to Cart</button>
</a>

</div>


{% endfor %}

</div>

    </div>
    </div>
</body>

</html>
